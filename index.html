<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOMINHYUNG</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: -apple-system, sans-serif;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            margin-bottom: 4rem;
        }
        main { flex: 1; margin-bottom: 6rem; }
        
        /* 탭 기본 숨김/노출 */
        .section { display: none; }
        .section.active { display: block; }

        /* 대담한 타이포그래피 (레퍼런스 반영) */
        .hero-title {
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 900;
            line-height: 0.9;
            text-transform: uppercase;
            margin-bottom: 3rem;
        }
        
        /* 가로 스크롤 컨테이너 */
        .work-container {
            display: flex;
            gap: 1.5rem;
            overflow-x: auto;
            padding-bottom: 1.5rem;
        }
        .work-card {
            flex: 0 0 350px;
            border: 1px solid #000000;
            padding: 1rem;
            height: 450px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: #fafafa;
        }
        .card-img {
            width: 100%;
            height: 280px;
            background-size: cover;
            background-position: center;
            background-color: #eee;
        }
        
        /* 연락처 거대 링크 */
        .contact-links { display: flex; flex-direction: column; gap: 1rem; }
        .contact-links a {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 800;
            color: #000000;
            text-decoration: none;
        }

        /* 하단 탭 바 */
        nav {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #ffffff;
            border: 1px solid #000000;
            padding: 0.75rem 2rem;
            display: flex;
            gap: 2rem;
        }
        nav button {
            background: none;
            border: none;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            color: #aaa;
        }
        nav button.active { color: #000; text-decoration: underline; }

        /* 모바일 최적화 */
        @media (max-width: 768px) {
            .work-container { flex-direction: column; }
            .work-card { flex: 1 0 auto; width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div>CHOMINHYUNG</div>
        <div style="text-align: right;">[ARCHIVE]<br>SEOUL, KR</div>
    </header>

    <main>
        <!-- HOME -->
        <section id="home" class="section active">
            <h1 class="hero-title">Artistic<br>Authenticity</h1>
            <div class="work-container">
                <div class="work-card">
                    <div>[01 / FILM]</div>
                    <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=600&auto=format&fit=crop')"></div>
                    <div style="font-weight:bold;">슬픔의 승화 (Sublimation)</div>
                </div>
                <div class="work-card">
                    <div>[02 / AD]</div>
                    <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=600&auto=format&fit=crop')"></div>
                    <div style="font-weight:bold;">브랜드 필름 '내러티브' (조연출)</div>
                </div>
            </div>
        </section>

        <!-- WORK -->
        <section id="work" class="section">
            <h1 class="hero-title">Selected<br>Archive</h1>
            <div class="work-container">
                <div class="work-card">
                    <div>[03 / AUDIO]</div>
                    <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?q=80&w=600&auto=format&fit=crop')"></div>
                    <div style="font-weight:bold;">Logic Pro Sound Track</div>
                </div>
                <div class="work-card">
                    <div>[04 / 3D]</div>
                    <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=600&auto=format&fit=crop')"></div>
                    <div style="font-weight:bold;">Blender 3D VFX 실험작</div>
                </div>
            </div>
        </section>

        <!-- CONTACT -->
        <section id="contact" class="section">
            <h1 class="hero-title">Connect</h1>
            <div class="contact-links">
                <a href="mailto:your-email@gmail.com">EMAIL</a>
                <a href="https://behance.net" target="_blank">BEHANCE</a>
                <a href="https://are.na" target="_blank">ARE.NA</a>
            </div>
        </section>
    </main>

    <nav>
        <button onclick="switchTab('home')" id="btn-home" class="active">Home</button>
        <button onclick="switchTab('work')" id="btn-work">Work</button>
        <button onclick="switchTab('contact')" id="btn-contact">Contact</button>
    </nav>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
            window.scrollTo({ top: 0 });
        }
    </script>
</body>
</html>
