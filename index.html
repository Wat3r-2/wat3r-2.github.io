<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>*Wat3r! | 조민형 Archive</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            /* 눈이 편안한 차분한 옐로우/베이지 계열 배경 */
            background-color: #e4e2d3; 
            color: #111;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* 좌측 상단 홈 버튼 로고 */
        .home-logo {
            position: fixed;
            top: 2rem;
            left: 2rem;
            font-size: 1.5rem;
            font-weight: 900;
            color: #111;
            text-decoration: none;
            z-index: 100;
            letter-spacing: -0.03em;
            transition: transform 0.3s;
        }
        .home-logo:hover { transform: scale(1.05); }

        /* 우측 상단 네비게이션 */
        .nav-menu {
            position: fixed;
            top: 2.2rem;
            right: 2rem;
            list-style: none;
            z-index: 100;
            text-align: right;
        }
        .nav-menu li { margin-bottom: 0.4rem; }
        .nav-menu a {
            text-decoration: none;
            color: #111;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }
        .nav-menu a:hover {
            font-weight: 800;
            padding-right: 5px;
        }

        /* HERO SECTION (메인 화면) */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 은은한 중앙 빛 번짐 */
        .glow-orb {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70vw; height: 70vw;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, rgba(228,226,211,0) 60%);
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
        }

        .hero-text {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            width: 100%;
        }
        .hero-text p { font-size: 0.85rem; letter-spacing: 0.05em; margin-bottom: 0.5rem; font-weight: 300; }
        .hero-text h1 { font-size: clamp(3.5rem, 8vw, 6rem); font-weight: 900; letter-spacing: -0.05em; margin-bottom: 0.5rem; }

        .floating-char { position: absolute; font-size: 1.2rem; font-weight: 400; z-index: 2; }

        /* 딱 5개의 박스가 뱀처럼 움직이는 트랙 */
        .snake-wrapper {
            position: absolute;
            bottom: 5%;
            width: 100%;
            height: 400px;
            z-index: 10;
            overflow: hidden;
            pointer-events: none; /* 클릭 방해 금지 */
        }

        .snake-box {
            position: absolute;
            background-color: #141414;
            cursor: pointer;
            border-radius: 2px;
            pointer-events: auto; /* 박스 자체는 클릭/호버 가능 */
            top: 50%; /* 수직 중앙 기준점 */
        }
        
        /* 박스 호버 기믹 */
        .snake-box::after {
            content: 'VIEW';
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 0.8rem; letter-spacing: 0.1em;
            opacity: 0; transition: opacity 0.3s;
        }
        .snake-box:hover::after { opacity: 1; }
        .snake-box:hover { z-index: 30; }

        /* 각기 다른 크기와 형태 (무작위 느낌) */
        .snake-box:nth-child(1) { width: 280px; height: 160px; margin-top: -80px; }
        .snake-box:nth-child(2) { width: 200px; height: 240px; margin-top: -120px; }
        .snake-box:nth-child(3) { width: 320px; height: 140px; margin-top: -70px; }
        .snake-box:nth-child(4) { width: 240px; height: 180px; margin-top: -90px; }
        .snake-box:nth-child(5) { width: 300px; height: 200px; margin-top: -100px; }

        /* 애니메이션 정의: 수평 이동(slither) + 수직 웨이브(bob) */
        @keyframes slither {
            0% { left: 100vw; }
            100% { left: -400px; } /* 화면 왼쪽으로 완전히 빠져나가도록 */
        }
        @keyframes bob {
            0% { transform: translateY(-70px); }
            100% { transform: translateY(70px); }
        }

        /* 5개의 박스가 일정한 간격으로 이어지도록 '음수(-) 딜레이' 적용 
           - 음수 딜레이를 주면 새로고침하자마자 박스들이 이미 화면 곳곳에 퍼진 상태로 시작합니다!
        */
        .snake-box:nth-child(1) { animation: slither 35s linear infinite -0s, bob 4s ease-in-out infinite alternate -0s; }
        .snake-box:nth-child(2) { animation: slither 35s linear infinite -7s, bob 4s ease-in-out infinite alternate -0.8s; }
        .snake-box:nth-child(3) { animation: slither 35s linear infinite -14s, bob 4s ease-in-out infinite alternate -1.6s; }
        .snake-box:nth-child(4) { animation: slither 35s linear infinite -21s, bob 4s ease-in-out infinite alternate -2.4s; }
        .snake-box:nth-child(5) { animation: slither 35s linear infinite -28s, bob 4s ease-in-out infinite alternate -3.2s; }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .home-logo { top: 1.5rem; left: 1.5rem; }
            .nav-menu { top: 1.5rem; right: 1.5rem; }
            .hero-text { top: 35%; }
            .snake-box:nth-child(1) { width: 200px; height: 120px; margin-top:-60px; }
            .snake-box:nth-child(2) { width: 140px; height: 180px; margin-top:-90px; }
            .snake-box:nth-child(3) { width: 220px; height: 110px; margin-top:-55px; }
            .snake-box:nth-child(4) { width: 180px; height: 130px; margin-top:-65px; }
            .snake-box:nth-child(5) { width: 210px; height: 150px; margin-top:-75px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="home-logo">*Wat3r!</a>

    <ul class="nav-menu">
        <li><a href="about.html">*about</a></li>
        <li><a href="film.html">*film</a></li>
        <li><a href="photo.html">*photo</a></li>
        <li><a href="trial.html">*trial</a></li>
        <li><a href="etc.html">*etc</a></li>
        <li><a href="contact.html">*contact</a></li>
    </ul>

    <section class="hero-section">
        <div class="glow-orb"></div>

        <div class="floating-char" style="top: 20%; left: 15%; font-weight: 600;">&amp;</div>
        <div class="floating-char" style="top: 25%; right: 25%; font-size: 1.5rem;">~</div>
        <div class="floating-char" style="top: 60%; left: 20%; font-size: 2.5rem; font-weight: 800;">'hi'</div>

        <div class="hero-text">
            <p id="rand-top">CHOMINHYUNG</p>
            <h1>*Wat3r!</h1>
            <p id="rand-bottom">KINDA ARTISTIC</p>
        </div>

        <div class="snake-wrapper">
            <div class="snake-box"></div>
            <div class="snake-box"></div>
            <div class="snake-box"></div>
            <div class="snake-box"></div>
            <div class="snake-box"></div>
        </div>
    </section>

    <script>
        // 1. 위쪽에 들어갈 문구 리스트 (원하는 대로 추가/수정 가능)
        const topSentences = [
            "안녕하세요 저는 조민형입니다",
            "WELCOME TO MY SPACE",
            "MINIMAL & ARTISTIC",
            "영화감독을 꿈꾸는",
            "예술적 진정성을 담은 아카이브"
        ];

        // 2. 아래쪽에 들어갈 문구 리스트
        const bottomSentences = [
            "좋은 아침입니다",
            "KINDA ARTISTIC",
            "오늘도 평화로운 하루",
            "FILM & AUDIO ARCHIVE",
            "HAVE A GOOD DAY"
        ];

        // 3. 페이지 로드 시 랜덤하게 하나씩 골라서 HTML에 꽂아줌
        window.onload = function() {
            const randomTop = topSentences[Math.floor(Math.random() * topSentences.length)];
            const randomBottom = bottomSentences[Math.floor(Math.random() * bottomSentences.length)];
            
            document.getElementById('rand-top').innerText = randomTop;
            document.getElementById('rand-bottom').innerText = randomBottom;
        }
    </script>
</body>
</html>
