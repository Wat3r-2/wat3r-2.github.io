<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>*Wat3r! | 조민형 Archive</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #e4e2d3; 
            color: #111;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* 1. 홈 버튼 로고 얇게 변경 (font-weight: 300) */
        .home-logo {
            position: fixed;
            top: 2rem;
            left: 2rem;
            font-size: 1.5rem;
            font-weight: 300; 
            color: #111;
            text-decoration: none;
            z-index: 100;
            letter-spacing: -0.03em;
            transition: transform 0.3s;
        }
        .home-logo:hover { transform: scale(1.05); font-weight: 600; }

        .nav-menu {
            position: fixed;
            top: 2.2rem;
            right: 2rem;
            list-style: none;
            z-index: 100;
            text-align: right;
        }
        .nav-menu li { margin-bottom: 0.4rem; }
        .nav-menu a {
            text-decoration: none;
            color: #111;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }
        .nav-menu a:hover {
            font-weight: 800;
            padding-right: 5px;
        }

        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .glow-orb {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70vw; height: 70vw;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, rgba(228,226,211,0) 60%);
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
        }

        .hero-text {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            width: 100%;
        }
        .hero-text p { font-size: 0.85rem; letter-spacing: 0.05em; margin-bottom: 0.5rem; font-weight: 300; }
        .hero-text h1 { font-size: clamp(3.5rem, 8vw, 6rem); font-weight: 900; letter-spacing: -0.05em; margin-bottom: 0.5rem; }

        .floating-char { position: absolute; font-size: 1.2rem; font-weight: 400; z-index: 2; pointer-events: none; }

        /* 2. 드래그 가능한 무한 슬라이더 래퍼 설정 */
        .snake-wrapper {
            position: absolute;
            bottom: 5%;
            width: 100%;
            height: 400px;
            z-index: 10;
            overflow-x: auto;
            overflow-y: hidden;
            cursor: grab;
            -ms-overflow-style: none; /* IE and Edge */
            scrollbar-width: none; /* Firefox */
        }
        .snake-wrapper::-webkit-scrollbar { display: none; /* Chrome, Safari and Opera */ }
        .snake-wrapper:active { cursor: grabbing; }
        
        .snake-track {
            display: flex;
            align-items: center;
            gap: 6vw;
            height: 100%;
            width: max-content;
            padding: 0 5vw;
        }

        .snake-box {
            flex-shrink: 0;
            background-color: #141414;
            border-radius: 2px;
            position: relative;
            animation: bob 4s ease-in-out infinite alternate;
            pointer-events: none; /* 드래그 충돌 방지 */
        }
        .snake-box::after {
            content: 'VIEW';
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 0.8rem; letter-spacing: 0.1em;
            opacity: 0; transition: opacity 0.3s;
        }
        /* 드래그 중이 아닐 때만 클릭/호버 활성화 */
        .snake-wrapper:not(:active) .snake-box { pointer-events: auto; cursor: pointer; }
        .snake-box:hover::after { opacity: 1; }
        .snake-box:hover { z-index: 30; }

        /* 5개 박스 사이즈 및 딜레이 설정 (무한 루프를 위해 2세트 반복됨) */
        .snake-box:nth-child(5n+1) { width: 280px; height: 160px; margin-top: -80px; animation-delay: 0s; }
        .snake-box:nth-child(5n+2) { width: 200px; height: 240px; margin-top: -120px; animation-delay: -0.8s; }
        .snake-box:nth-child(5n+3) { width: 320px; height: 140px; margin-top: -70px; animation-delay: -1.6s; }
        .snake-box:nth-child(5n+4) { width: 240px; height: 180px; margin-top: -90px; animation-delay: -2.4s; }
        .snake-box:nth-child(5n+5) { width: 300px; height: 200px; margin-top: -100px; animation-delay: -3.2s; }

        /* 뱀처럼 위아래로 꿈틀거리는 애니메이션 */
        @keyframes bob {
            0% { transform: translateY(-70px); }
            100% { transform: translateY(70px); }
        }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .home-logo { top: 1.5rem; left: 1.5rem; }
            .nav-menu { top: 1.5rem; right: 1.5rem; }
            .hero-text { top: 35%; }
            
            .snake-wrapper { height: 250px; bottom: 10%; }
            .snake-box:nth-child(5n+1) { width: 200px; height: 120px; margin-top:-60px; }
            .snake-box:nth-child(5n+2) { width: 140px; height: 180px; margin-top:-90px; }
            .snake-box:nth-child(5n+3) { width: 220px; height: 110px; margin-top:-55px; }
            .snake-box:nth-child(5n+4) { width: 180px; height: 130px; margin-top:-65px; }
            .snake-box:nth-child(5n+5) { width: 210px; height: 150px; margin-top:-75px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="home-logo">*Wat3r!</a>

    <ul class="nav-menu">
        <li><a href="about.html">*about</a></li>
        <li><a href="film.html">*film</a></li>
        <li><a href="photo.html">*photo</a></li>
        <li><a href="trial.html">*trial</a></li>
        <li><a href="etc.html">*etc</a></li>
        <li><a href="contact.html">*contact</a></li>
    </ul>

    <section class="hero-section">
        <div class="glow-orb"></div>

        <div class="floating-char" style="top: 20%; left: 15%; font-weight: 600;">&amp;</div>
        <div class="floating-char" style="top: 25%; right: 25%; font-size: 1.5rem;">~</div>
        <div class="floating-char" style="top: 60%; left: 20%; font-size: 2.5rem; font-weight: 800;">'hi'</div>

        <div class="hero-text">
            <p id="rand-top">CHOMINHYUNG</p>
            <h1>*Wat3r!</h1>
            <p id="rand-bottom">KINDA ARTISTIC</p>
        </div>

        <div class="snake-wrapper" id="snakeWrapper">
            <div class="snake-track" id="snakeTrack">
                <div class="snake-box"></div>
                <div class="snake-box"></div>
                <div class="snake-box"></div>
                <div class="snake-box"></div>
                <div class="snake-box"></div>
                <div class="snake-box"></div>
                <div class="snake-box"></div>
                <div class="snake-box"></div>
                <div class="snake-box"></div>
                <div class="snake-box"></div>
            </div>
        </div>
    </section>

    <script>
        // 1. 랜덤 텍스트 설정
        const topSentences = [
            "안녕하세요 저는 조민형입니다",
            "WELCOME TO MY SPACE",
            "MINIMAL & ARTISTIC",
            "영화감독을 꿈꾸는",
            "예술적 진정성을 담은 아카이브"
        ];
        const bottomSentences = [
            "좋은 아침입니다",
            "KINDA ARTISTIC",
            "오늘도 평화로운 하루",
            "FILM & AUDIO ARCHIVE",
            "HAVE A GOOD DAY"
        ];

        window.onload = function() {
            document.getElementById('rand-top').innerText = topSentences[Math.floor(Math.random() * topSentences.length)];
            document.getElementById('rand-bottom').innerText = bottomSentences[Math.floor(Math.random() * bottomSentences.length)];
        }

        // 2. 무한 슬라이더 및 드래그 로직
        const wrapper = document.getElementById('snakeWrapper');
        const track = document.getElementById('snakeTrack');
        
        let isDown = false;
        let startX;
        let scrollLeft;
        let animationId;
        let autoScrollSpeed = 0.8; // 천천히 흘러가는 속도

        function autoScroll() {
            if(!isDown) {
                wrapper.scrollLeft += autoScrollSpeed;
                
                // 트랙의 절반(원본 5개 길이)을 넘어가면 부드럽게 처음으로 리셋 (무한 뱀 효과)
                if (wrapper.scrollLeft >= (track.scrollWidth / 2)) {
                    wrapper.scrollLeft = 0;
                }
            }
            animationId = requestAnimationFrame(autoScroll);
        }
        
        // 자동 스크롤 시작
        autoScroll();

        // [PC 마우스 드래그]
        wrapper.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - wrapper.offsetLeft;
            scrollLeft = wrapper.scrollLeft;
        });
        wrapper.addEventListener('mouseleave', () => { isDown = false; });
        wrapper.addEventListener('mouseup', () => { isDown = false; });
        wrapper.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - wrapper.offsetLeft;
            const walk = (x - startX) * 1.5; // 드래그 민감도
            wrapper.scrollLeft = scrollLeft - walk;
        });

        // [모바일 터치 스와이프]
        wrapper.addEventListener('touchstart', (e) => {
            isDown = true;
            startX = e.touches[0].pageX - wrapper.offsetLeft;
            scrollLeft = wrapper.scrollLeft;
        });
        wrapper.addEventListener('touchend', () => { isDown = false; });
        wrapper.addEventListener('touchmove', (e) => {
            if (!isDown) return;
            const x = e.touches[0].pageX - wrapper.offsetLeft;
            const walk = (x - startX) * 1.5;
            wrapper.scrollLeft = scrollLeft - walk;
        });
    </script>
</body>
</html>
