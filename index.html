<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOMINHYUNG | Film Director</title>
    <style>
        /* 1. RESET & BASE STYLES (미니멀 예술영화 미학 반영) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 크로스 디서플린 레이아웃 가이드선 */
        .border-line {
            border-top: 1px solid #000000;
            margin: 2rem 0;
        }

        /* 2. HEADER (상단 메타 정보) */
        header {
            width: 100%;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            font-size: 0.8rem;
            letter-spacing: 0.1rem;
            text-transform: uppercase;
        }

        .meta-right {
            text-align: right;
        }

        /* 3. MAIN CONTAINER & SECTIONS */
        main {
            flex: 1;
            padding: 0 2rem 8rem 2rem; /* 하단 네비게이션 공간 확보 */
        }

        .section {
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .section.active {
            display: block;
            opacity: 1;
        }

        /* HOME / WORK: 대담한 타이포그래피 (레퍼런스 1, 3 반영) */
        .hero-title {
            font-size: clamp(2.5rem, 8vw, 6.5rem);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -0.03em;
            text-transform: uppercase;
            margin-bottom: 2rem;
            word-break: keep-all;
        }

        .section-desc {
            font-size: 1rem;
            max-width: 500px;
            line-height: 1.6;
            color: #333333;
            margin-bottom: 3rem;
        }

        /* 4. PORTFOLIO CAROUSEL (가로 스크롤 - 레퍼런스 2, 3 반영) */
        .work-container {
            display: flex;
            gap: 1.5rem;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            padding-bottom: 2rem;
            -webkit-overflow-scrolling: touch;
        }

        /* 스크롤바 숨기기 */
        .work-container::-webkit-scrollbar {
            height: 4px;
        }
        .work-container::-webkit-scrollbar-thumb {
            background: #000000;
        }

        .work-card {
            flex: 0 0 400px; /* 데스크톱 기본 크기 */
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            border: 1px solid #000000;
            padding: 1rem;
            justify-content: space-between;
            height: 500px;
            background: #fafafa;
        }

        .work-card .card-meta {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .work-card .card-image {
            width: 100%;
            height: 320px;
            background-color: #e0e0e0; /* 실제 이미지 링크 전 더미 영역 */
            background-size: cover;
            background-position: center;
            filter: grayscale(100%);
            transition: filter 0.3s ease;
        }

        .work-card:hover .card-image {
            filter: grayscale(0%);
        }

        .work-card .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-top: 1rem;
            text-transform: uppercase;
        }

        /* 5. CONTACT (레퍼런스 1 스타일의 거대한 텍스트 링크) */
        .contact-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 4rem;
        }

        .contact-links a {
            font-size: clamp(2rem, 7vw, 5rem);
            font-weight: 800;
            color: #000000;
            text-decoration: none;
            line-height: 1;
            letter-spacing: -0.02em;
            transition: transform 0.2s ease, padding-left 0.2s ease;
            width: fit-content;
        }

        .contact-links a:hover {
            padding-left: 1rem;
        }

        /* 6. FLOATING NAVIGATION (하단 중앙 미니멀 탭) */
        nav {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #000000;
            padding: 0.75rem 2rem;
            display: flex;
            gap: 2.5rem;
            z-index: 1000;
            border-radius: 0;
        }

        nav button {
            background: none;
            border: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            cursor: pointer;
            color: #aaaaaa;
            text-transform: uppercase;
            transition: color 0.3s ease;
            padding: 0.25rem 0;
            position: relative;
        }

        nav button.active {
            color: #000000;
        }

        nav button.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: #000000;
        }

        /* 7. RESPONSIVE DESIGN (모바일, 태블릿 완벽 대응) */
        @media (max-width: 1024px) {
            /* 태블릿 환경 */
            .work-card {
                flex: 0 0 320px;
                height: 420px;
            }
            .work-card .card-image {
                height: 240px;
            }
        }

        @media (max-width: 768px) {
            /* 모바일 환경: 세로 그리드로 전환하여 직관성 확보 */
            header {
                padding: 1.5rem;
            }
            main {
                padding: 0 1.5rem 8rem 1.5rem;
            }
            .work-container {
                flex-direction: column;
                overflow-x: visible;
                gap: 2rem;
            }
            .work-card {
                flex: 1 0 auto;
                width: 100%;
                height: auto;
            }
            .work-card .card-image {
                height: 220px;
            }
            nav {
                width: 90%;
                justify-content: space-around;
                gap: 0;
                bottom: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div>CHOMINHYUNG</div>
