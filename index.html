<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>*Wat3r! | 조민형 Archive</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            /* 눈이 편안한 차분한 옐로우/베이지 계열 배경 (레퍼런스 반영) */
            background-color: #e4e2d3; 
            color: #111;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* 네비게이션 (고정) */
        .nav-menu {
            position: fixed;
            top: 2rem;
            right: 2rem;
            list-style: none;
            z-index: 100;
            text-align: right;
        }
        .nav-menu li { margin-bottom: 0.4rem; }
        .nav-menu a {
            text-decoration: none;
            color: #111;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }
        .nav-menu a:hover {
            font-weight: 800;
            padding-right: 5px;
        }

        /* HERO SECTION (메인 화면) */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 은은한 중앙 빛 번짐 (눈에 띄지 않게 아주 살짝만) */
        .glow-orb {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70vw; height: 70vw;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, rgba(228,226,211,0) 60%);
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
        }

        .hero-text {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            width: 100%;
        }
        .hero-text p { font-size: 0.85rem; letter-spacing: 0.05em; margin-bottom: 0.5rem; font-weight: 300; }
        .hero-text h1 { font-size: clamp(3.5rem, 8vw, 6rem); font-weight: 900; letter-spacing: -0.05em; margin-bottom: 0.5rem; }

        .floating-char { position: absolute; font-size: 1.2rem; font-weight: 400; z-index: 2; }

        /* 여유로운 Marquee 썸네일 띠 */
        .marquee-wrapper {
            position: absolute;
            width: 100%;
            z-index: 10;
        }
        .marquee-wrapper.row-1 { bottom: 15%; }
        .marquee-wrapper.row-2 { bottom: -5%; }

        .marquee-track {
            display: flex;
            width: max-content;
            gap: 8vw; /* 넓은 간격 유지 */
            animation: scroll-left linear infinite;
        }
        .row-1 .marquee-track { animation-duration: 45s; } 
        .row-2 .marquee-track { animation-duration: 55s; animation-direction: reverse; } 

        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* 썸네일 박스 디자인 & 무작위 배치 효과 */
        .thumbnail-box {
            background-color: #141414;
            cursor: pointer;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            border-radius: 2px;
        }
        .thumbnail-box:nth-child(odd) { width: 280px; height: 160px; transform: translateY(-20px); }
        .thumbnail-box:nth-child(even) { width: 200px; height: 240px; transform: translateY(30px); }
        .thumbnail-box:nth-child(3n) { width: 320px; height: 140px; transform: translateY(10px); }
        
        .thumbnail-box:hover { z-index: 20; transform: scale(1.05) translateY(0) !important; }
        
        .thumbnail-box::after {
            content: 'VIEW';
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 0.8rem; letter-spacing: 0.1em;
            opacity: 0; transition: opacity 0.3s;
        }
        .thumbnail-box:hover::after { opacity: 1; }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .nav-menu { top: 1.5rem; right: 1.5rem; }
            .thumbnail-box:nth-child(odd) { width: 200px; height: 120px; }
            .thumbnail-box:nth-child(even) { width: 140px; height: 180px; }
            .thumbnail-box:nth-child(3n) { width: 220px; height: 110px; }
            .hero-text { top: 35%; }
            .marquee-wrapper.row-1 { bottom: 25%; }
            .marquee-wrapper.row-2 { bottom: 5%; }
        }
    </style>
</head>
<body>

    <ul class="nav-menu">
        <li><a href="index.html">*home</a></li>
        <li><a href="about.html">*about</a></li>
        <li><a href="film.html">*film</a></li>
        <li><a href="photo.html">*photo</a></li>
        <li><a href="trial.html">*trial</a></li>
        <li><a href="etc.html">*etc</a></li>
        <li><a href="contact.html">*contact</a></li>
    </ul>

    <section class="hero-section">
        <div class="glow-orb"></div>

        <div class="floating-char" style="top: 15%; left: 15%; font-weight: 600;">&amp;</div>
        <div class="floating-char" style="top: 25%; right: 25%; font-size: 1.5rem;">~</div>
        <div class="floating-char" style="top: 60%; left: 20%; font-size: 2.5rem; font-weight: 800;">'hi'</div>

        <div class="hero-text">
            <p>CHOMINHYUNG</p>
            <h1>*Wat3r!</h1>
            <p>KINDA ARTISTIC</p>
        </div>

        <div class="marquee-wrapper row-1">
            <div class="marquee-track">
                <div class="thumbnail-box"></div><div class="thumbnail-box"></div><div class="thumbnail-box"></div><div class="thumbnail-box"></div>
                <div class="thumbnail-box"></div><div class="thumbnail-box"></div><div class="thumbnail-box"></div><div class="thumbnail-box"></div>
            </div>
        </div>

        <div class="marquee-wrapper row-2">
            <div class="marquee-track">
                <div class="thumbnail-box"></div><div class="thumbnail-box"></div><div class="thumbnail-box"></div><div class="thumbnail-box"></div>
                <div class="thumbnail-box"></div><div class="thumbnail-box"></div><div class="thumbnail-box"></div><div class="thumbnail-box"></div>
            </div>
        </div>
    </section>

</body>
</html>
